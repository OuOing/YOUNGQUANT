version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: youngquant
      POSTGRES_USER: youngquant
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U youngquant"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  youngquant:
    build: .
    ports:
      - "8080:8080"
    environment:
      - GIN_MODE=release
      - PROJECT_DIR=/app
      - JWT_SECRET=${JWT_SECRET}
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY}
    volumes:
      - ./data:/app/data
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/api/stocks"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  postgres_data:
